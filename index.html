
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>কিশলয় বিকশিত পুস্তক</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
}

header{
    background:linear-gradient(135deg,#2e7d32,#66bb6a);
    color:white;
    text-align:center;
    padding:30px;
}

.logo{
    height:100px;
    margin-bottom:10px;
}

header h1{
    margin-bottom:10px;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.form-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    margin-bottom:25px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    background:#1565c0;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.book-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.badge{
    display:inline-block;
    padding:5px 10px;
    border-radius:20px;
    font-size:12px;
    color:white;
    margin-top:8px;
}

.donate{
    background:green;
}

.exchange{
    background:orange;
}

footer{
    margin-top:40px;
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:15px;
}
</style>
</head>

<body>

<header>

<img src="ChatGPT Image Jun 2, 2026, 04_45_19 PM.png" alt="কিশলয় বিকশিত পুস্তক" class="logo">

<h1>📚 কিশলয় বিকশিত পুস্তক</h1>

<p>
যে বই আপনার আর প্রয়োজন নেই,
সেটাই অন্য কারও জ্ঞানের আলো হতে পারে
</p>

</header>

<div class="container">

<div class="form-box">
<h2>নতুন বই যোগ করুন</h2>

<input type="text" id="title" placeholder="বইয়ের নাম">

<input type="text" id="author" placeholder="লেখকের নাম">

<select id="category">
<option>গল্প</option>
<option>উপন্যাস</option>
<option>পাঠ্যবই</option>
<option>বিজ্ঞান</option>
<option>ইতিহাস</option>
<option>প্রতিযোগিতামূলক পরীক্ষা</option>
<option>অন্যান্য</option>
</select>

<select id="type">
<option value="দান">দান</option>
<option value="বিনিময়">বিনিময়</option>
</select>

<input type="text" id="contact" placeholder="যোগাযোগ নম্বর">

<input type="text" id="image" placeholder="ছবির URL">

<textarea id="desc" placeholder="বই সম্পর্কে লিখুন"></textarea>

<button onclick="addBook()">বই যোগ করুন</button>
</div>

<h2>উপলব্ধ বইসমূহ</h2>
<br>

<div class="book-grid" id="bookList"></div>

</div>

<footer>
© 2026 কিশলয় বিকশিত পুস্তক | Share Books, Spread Knowledge
</footer>

<script>

let books=[];

function addBook(){

let title=document.getElementById("title").value;
let author=document.getElementById("author").value;
let category=document.getElementById("category").value;
let type=document.getElementById("type").value;
let contact=document.getElementById("contact").value;
let image=document.getElementById("image").value;
let desc=document.getElementById("desc").value;

if(title===""){
alert("বইয়ের নাম লিখুন");
return;
}

books.push({
title,
author,
category,
type,
contact,
image:image || "https://picsum.photos/500/300",
desc
});

renderBooks();

document.getElementById("title").value="";
document.getElementById("author").value="";
document.getElementById("contact").value="";
document.getElementById("image").value="";
document.getElementById("desc").value="";
}

function renderBooks(){

let html="";

books.forEach(book=>{

html+=`
<div class="card">

<img src="${book.image}">

<div class="card-content">

<h3>${book.title}</h3>

<p><b>লেখক:</b> ${book.author}</p>

<p><b>বিভাগ:</b> ${book.category}</p>

<p>${book.desc}</p>

<span class="badge ${book.type==='দান'?'donate':'exchange'}">
${book.type}
</span>

<p style="margin-top:10px;">
📞 ${book.contact}
</p>

</div>
</div>
`;
});

document.getElementById("bookList").innerHTML=html;
}

</script>

</body>
</html>
